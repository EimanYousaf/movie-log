<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Book Log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <h1>My Book Log</h1>
    <p class="sub">Track what you want to read, what you’re reading, and what you finished.</p>
  </header>

  <main class="container">

    <!-- controls -->
    <section class="controls card">
      <div class="row">
        <div class="field">
          <label for="searchInput">Search (title or author)</label>
          <input id="searchInput" type="text" placeholder="Search books..." />
        </div>

        <div class="field">
          <label for="filterStatus">Filter (status)</label>
          <select id="filterStatus">
            <option value="all">All</option>
            <option value="To Read">To Read</option>
            <option value="Reading">Reading</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <div class="field">
          <label for="sortBy">Sort</label>
          <select id="sortBy">
            <option value="newest">Newest Added</option>
            <option value="titleAZ">Title (A → Z)</option>
            <option value="yearDesc">Year (High → Low)</option>
            <option value="ratingDesc">Rating (High → Low)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- add book -->
    <section class="card">
      <h2>Add a book</h2>

      <form id="movieForm" class="row" autocomplete="off">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" type="text" placeholder="e.g., The Hunger Games" required />
        </div>

        <div class="field">
          <label for="genre">Genre</label>
          <input id="genre" type="text" placeholder="e.g., Fantasy" required />
        </div>

        <div class="field">
          <label for="author">Author</label>
          <input id="author" type="text" placeholder="e.g., Suzanne Collins" required />
        </div>

        <div class="field">
          <label for="year">Year</label>
          <input id="year" type="number" min="1450" max="2100" placeholder="e.g., 2008" required />
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status" required>
            <option value="To Read">To Read</option>
            <option value="Reading">Reading</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <div class="field btnField">
          <button type="submit" class="btn">Add</button>
        </div>
      </form>

      <p id="formMsg" class="msg" aria-live="polite"></p>
    </section>

    <!-- list -->
    <section class="card">
      <div class="listHeader">
        <h2>Your books</h2>
        <p class="muted" id="countText">0 books</p>
      </div>

      <div id="movieList" class="list"></div>
      <p id="emptyState" class="muted">No books yet. Add one above.</p>
    </section>

    <!-- toast message -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- confetti -->
    <div id="confetti" class="confetti"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Movie Log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <h1>🎬 My Movie Log</h1>
    <p class="sub">Track what you want to watch, what you’re watching, and what you finished.</p>
  </header>

  <main class="container">

    <!-- Controls -->
    <section class="controls card">
      <div class="row">
        <div class="field">
          <label for="searchInput">Search (title)</label>
          <input id="searchInput" type="text" placeholder="Search movies..." />
        </div>

        <div class="field">
          <label for="filterStatus">Filter (status)</label>
          <select id="filterStatus">
            <option value="all">All</option>
            <option value="To Watch">To Watch</option>
            <option value="Watching">Watching</option>
            <option value="Watched">Watched</option>
          </select>
        </div>

        <div class="field">
          <label for="sortBy">Sort</label>
          <select id="sortBy">
            <option value="newest">Newest Added</option>
            <option value="titleAZ">Title (A → Z)</option>
            <option value="yearDesc">Year (High → Low)</option>
            <option value="ratingDesc">Rating (High → Low)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Add Movie -->
    <section class="card">
      <h2>Add a movie</h2>

      <form id="movieForm" class="row" autocomplete="off">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" type="text" placeholder="e.g., Inception" required />
        </div>

        <div class="field">
          <label for="genre">Genre</label>
          <input id="genre" type="text" placeholder="e.g., Sci-Fi" required />
        </div>

        <div class="field">
          <label for="year">Year (extra field)</label>
          <input id="year" type="number" min="1888" max="2100" placeholder="e.g., 2010" required />
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status" required>
            <option value="To Watch">To Watch</option>
            <option value="Watching">Watching</option>
            <option value="Watched">Watched</option>
          </select>
        </div>

        <div class="field btnField">
          <button type="submit" class="btn">Add</button>
        </div>
      </form>

      <p id="formMsg" class="msg" aria-live="polite"></p>
    </section>

    <!-- List -->
    <section class="card">
      <div class="listHeader">
        <h2>Your movies</h2>
        <p class="muted" id="countText">0 movies</p>
      </div>

      <div id="movieList" class="list"></div>
      <p id="emptyState" class="muted">No movies yet. Add one above 👆</p>
    </section>

    <!-- Celebration toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- Confetti layer -->
    <div id="confetti" class="confetti"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
